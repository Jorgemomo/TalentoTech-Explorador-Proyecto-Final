<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SEMED — Configurar Perfil</title>
    <link rel="icon" href="../static/imagenes/contacto/SEMED.png" title="SEMED" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../static/perfil.css" />
  </head>

  <body>

    <!-- ─── Header ─────────────────────────────────────── -->
    <header>
      <div class="logo">
        <img src="../static/imagenes/contacto/SEMED.png" alt="SEMED" />
        SEMED
      </div>
      <nav>
        <ul>
          <li><a href="./dashboard.html" class="btn-back">← Volver al Dashboard</a></li>
        </ul>
      </nav>
    </header>

    <!-- ─── Loading overlay ─────────────────────────────── -->
    <div class="loading-overlay" id="loadingOverlay">
      <div class="spinner"></div>
    </div>

    <!-- ─── Toast ───────────────────────────────────────── -->
    <div id="toast">
      <span class="toast-icon" id="toastIcon"></span>
      <span id="toastMsg"></span>
    </div>

    <!-- ─── Page ─────────────────────────────────────────── -->
    <div class="page-wrapper">

      <!-- ── Sidebar ──────────────────────────────────────── -->
      <aside>
        <div class="sidebar-card">
          <!-- Avatar con hover para cambiar foto -->
          <div class="avatar-wrapper" id="avatarWrapper" title="Cambiar foto de perfil">
            <img id="avatarPreview" src="" alt="Foto de perfil" />
            <div class="avatar-overlay">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/>
              </svg>
              Cambiar foto
            </div>
          </div>
          <input type="file" id="foto-input" accept="image/*" />

          <div class="sidebar-name" id="sidebarNombre">—</div>
          <div class="sidebar-area" id="sidebarArea">—</div>
          <div class="sidebar-email" id="sidebarEmail">—</div>

          <hr class="sidebar-divider" />

          <div class="sidebar-stat">
            <span>Teléfono</span>
            <strong id="statTelefono">—</strong>
          </div>
          <div class="sidebar-stat">
            <span>Ubicación</span>
            <strong id="statUbicacion">—</strong>
          </div>
        </div>
      </aside>

      <!-- ── Main ─────────────────────────────────────────── -->
      <div class="main-content">

        <!-- Datos básicos -->
        <div class="section-card">
          <div class="section-header">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
            </svg>
            <h2>Datos personales</h2>
          </div>
          <div class="section-body">
            <form id="formDatos">
              <div class="form-grid">
                <div class="form-group">
                  <label for="nombre">Nombre</label>
                  <input type="text" id="nombre" placeholder="Tu nombre" required />
                </div>
                <div class="form-group">
                  <label for="apellido">Apellido</label>
                  <input type="text" id="apellido" placeholder="Tu apellido" />
                </div>
                <div class="form-group">
                  <label for="telefono">Celular</label>
                  <input type="tel" id="telefono" placeholder="+57 300 000 0000" />
                </div>
                <div class="form-group">
                  <label for="ubicacion">Ubicación</label>
                  <input type="text" id="ubicacion" placeholder="Ciudad, País" />
                </div>
                <div class="form-group full">
                  <label for="descripcion">Descripción breve</label>
                  <textarea id="descripcion" placeholder="Cuéntanos un poco sobre ti…"></textarea>
                </div>
              </div>
              <div class="btn-row">
                <button type="submit" class="btn-save" id="btnDatos">
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                  </svg>
                  Guardar cambios
                </button>
              </div>
            </form>
          </div>
        </div>

        <!-- Correo -->
        <div class="section-card">
          <div class="section-header">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
            </svg>
            <h2>Correo electrónico</h2>
          </div>
          <div class="section-body">
            <form id="formEmail">
              <div class="form-grid">
                <div class="form-group">
                  <label for="emailActual">Correo actual</label>
                  <input type="email" id="emailActual" disabled placeholder="correo@ejemplo.com" />
                </div>
                <div class="form-group">
                  <label for="emailNuevo">Nuevo correo</label>
                  <input type="email" id="emailNuevo" placeholder="nuevo@ejemplo.com" required />
                </div>
                <div class="form-group full">
                  <label for="passVerifEmail">Confirmar con contraseña actual</label>
                  <input type="password" id="passVerifEmail" placeholder="••••••••" required />
                </div>
              </div>
              <div class="btn-row">
                <button type="submit" class="btn-save" id="btnEmail">
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                  </svg>
                  Actualizar correo
                </button>
              </div>
            </form>
          </div>
        </div>

        <!-- Contraseña -->
        <div class="section-card">
          <div class="section-header">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
            </svg>
            <h2>Cambiar contraseña</h2>
          </div>
          <div class="section-body">
            <form id="formPassword">
              <div class="form-grid">
                <div class="form-group full">
                  <label for="passActual">Contraseña actual</label>
                  <input type="password" id="passActual" placeholder="••••••••" required />
                </div>
                <div class="form-group">
                  <label for="passNueva">Nueva contraseña</label>
                  <input type="password" id="passNueva" placeholder="••••••••" required />
                  <div class="pass-strength-bar">
                    <div class="pass-strength-fill" id="passStrengthFill"></div>
                  </div>
                  <span class="pass-hint" id="passHint">Mínimo 8 caracteres</span>
                </div>
                <div class="form-group">
                  <label for="passConfirm">Confirmar nueva contraseña</label>
                  <input type="password" id="passConfirm" placeholder="••••••••" required />
                </div>
              </div>
              <div class="btn-row">
                <button type="submit" class="btn-save" id="btnPass">
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                  </svg>
                  Cambiar contraseña
                </button>
              </div>
            </form>
          </div>
        </div>

      </div><!-- /main-content -->
    </div><!-- /page-wrapper -->

    <script src="../static/js/perfil.js"></script>
  </body>
</html>
